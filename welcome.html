<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Entry — Harshan B</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@600&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(135deg, #fdfbfb 0%, #e2f1f8 100%);
    font-family: 'Outfit', sans-serif;
}

/* CANVAS */
canvas {
    position: absolute;
    inset: 0;
    z-index: 0;
}

/* CENTER CARD */
.center-card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 10;
    
    background: rgba(255, 255, 255, 0.6);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 1);
    border-radius: 30px;
    padding: 60px 80px;
    box-shadow: 0 20px 50px rgba(15, 23, 42, 0.05);
    
    animation: dropIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
    margin-top: -20px;
}

@keyframes dropIn {
    to { opacity: 1; margin-top: 0; }
}

.label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: #059669;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 15px;
    background: rgba(5, 150, 105, 0.1);
    padding: 6px 14px;
    border-radius: 50px;
    display: inline-block;
}

.name {
    font-size: 3.5rem;
    font-weight: 800;
    margin: 0;
    background: linear-gradient(120deg, #f43f5e 0%, #f97316 100%);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -1px;
}

.desc {
    margin-top: 10px;
    font-size: 1.1rem;
    color: #64748b;
    font-weight: 500;
}

.btn {
    margin-top: 35px;
    padding: 16px 36px;
    border-radius: 50px;
    background: #0f172a;
    color: white;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    font-weight: 600;
    text-decoration: none;
    display: inline-block;
    transition: all 0.3s ease;
    box-shadow: 0 10px 25px rgba(15, 23, 42, 0.2);
}

.btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 35px rgba(15, 23, 42, 0.3);
    background: white;
    color: #0f172a;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="center-card">
    <div class="name">Harshan B</div>
    <div class="desc">Data Engineering & Applied AI Systems</div>
    <a href="index.html" class="btn">Initialize_Portfolio()</a>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let centerX = canvas.width / 2;
let centerY = canvas.height / 2;

// Mouse tracking
let mouse = { x: null, y: null };

// Theme colors
const themeColors = ["#0284c7", "#059669", "#d97706", "#7c3aed", "#e11d48"];

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    centerX = canvas.width / 2;
    centerY = canvas.height / 2;
});

window.addEventListener("mousemove", (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

window.addEventListener("mouseout", () => {
    mouse.x = null;
    mouse.y = null;
});

class Pipeline {
    constructor() {
        this.reset();
    }

    reset() {
        // Spawn from edges and determine initial axis (X or Y)
        const edge = Math.floor(Math.random() * 4);
        if (edge === 0)      { this.x = -50; this.y = Math.random() * canvas.height; this.axis = 'x'; this.dir = 1; } // Left
        else if (edge === 1) { this.x = canvas.width + 50; this.y = Math.random() * canvas.height; this.axis = 'x'; this.dir = -1; } // Right
        else if (edge === 2) { this.x = Math.random() * canvas.width; this.y = -50; this.axis = 'y'; this.dir = 1; } // Top
        else                 { this.x = Math.random() * canvas.width; this.y = canvas.height + 50; this.axis = 'y'; this.dir = -1; } // Bottom

        this.history = [];
        
        // Speed adjusted for smooth drawing
        this.speed = 0.4 + Math.random() * 0.2; 
        
        this.color = themeColors[Math.floor(Math.random() * themeColors.length)];
        this.lineWidth = 1.5 + Math.random() * 2;
        
        this.segmentLength = 0;
        this.minSegment = 40 + Math.random() * 80;
    }

    update() {
        const targetX = mouse.x !== null ? mouse.x : centerX;
        const targetY = mouse.y !== null ? mouse.y : centerY;

        // Move strictly along the current axis
        if (this.axis === 'x') {
            this.x += this.speed * this.dir;
        } else {
            this.y += this.speed * this.dir;
        }

        this.segmentLength += this.speed;

        // Determine if it's time to make a 90-degree turn
        if (this.segmentLength > this.minSegment) {
            if (this.axis === 'x') {
                const dy = targetY - this.y;
                if (Math.abs(dy) > 20) {
                    this.axis = 'y';
                    this.dir = Math.sign(dy) || 1;
                    this.segmentLength = 0;
                    this.minSegment = 40 + Math.random() * 100;
                }
            } else {
                const dx = targetX - this.x;
                if (Math.abs(dx) > 20) {
                    this.axis = 'x';
                    this.dir = Math.sign(dx) || 1;
                    this.segmentLength = 0;
                    this.minSegment = 40 + Math.random() * 100;
                }
            }
        }

        // Record history for the trail (Continuous growth!)
        this.history.push({ x: this.x, y: this.y });

        // Reset ONLY if it hits the target (Mouse or Center)
        const dx = targetX - this.x;
        const dy = targetY - this.y;
        if (Math.sqrt(dx * dx + dy * dy) < 20) {
            this.reset();
        }
        
        // Failsafe: Reset if it wanders way off screen
        if (this.x < -100 || this.x > canvas.width + 100 || this.y < -100 || this.y > canvas.height + 100) {
            this.reset();
        }
    }

    draw() {
        if (this.history.length < 2) return;

        ctx.beginPath();
        ctx.moveTo(this.history[0].x, this.history[0].y);
        
        for (let i = 1; i < this.history.length; i++) {
            ctx.lineTo(this.history[i].x, this.history[i].y);
        }

        ctx.strokeStyle = this.color;
        ctx.lineWidth = this.lineWidth;
        
        ctx.lineJoin = "miter"; 
        ctx.lineCap = "square";
        
        ctx.shadowBlur = 12;
        ctx.shadowColor = this.color;
        
        ctx.stroke();
        ctx.shadowBlur = 0;
    }
}

// Reduced the number of total pipelines to 35 so the screen doesn't get completely covered in solid lines
let pipelines = [];
for (let i = 0; i < 35; i++) {
    setTimeout(() => {
        pipelines.push(new Pipeline());
    }, Math.random() * 4000);
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    pipelines.forEach(p => {
        p.update();
        p.draw();
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
